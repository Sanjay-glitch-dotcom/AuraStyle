{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraStyle - Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 24px;
            position: relative;
            z-index: 10;
        }



        .form-section {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .form-section.hidden {
            opacity: 0;
            transform: translateX(20px);
            pointer-events: none;
            position: absolute;
            width: calc(100% - 4rem);
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-input {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: #fff !important;
            backdrop-filter: blur(5px);
        }

        .auth-input::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
        }

        .auth-input:focus {
            box-shadow: 0 0 0 0.25rem rgba(78, 205, 196, 0.25) !important;
            border-color: #4ecdc4 !important;
        }
    </style>
</head>
<body>
    <div class="glass-panel auth-container animate-fade-up">
        <div class="auth-logo">AuraStyle</div>
        
        <!-- Login Form -->
        <div id="login-section" class="form-section">
            <h4 class="text-white text-center mb-4">Welcome Back</h4>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label text-white-50 small">Username</label>
                    <input type="text" class="form-control auth-input" id="login-username" required>
                </div>
                <div class="mb-4 position-relative">
                    <label class="form-label text-white-50 small">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control auth-input border-end-0" id="login-password" required>
                        <button class="btn btn-outline-secondary auth-input border-start-0 toggle-password" type="button"><i class="bi bi-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="login-submit-btn">Login</button>
            </form>
            <div class="text-center mt-4">
                <span class="text-white-50">Don't have an account?</span>
                <button class="btn btn-link text-info text-decoration-none p-0 ms-1 fw-bold" id="show-register">Register</button>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-section" class="form-section hidden">
            <h4 class="text-white text-center mb-4">Create Account</h4>
            <form id="register-form">
                <div class="mb-3">
                    <label class="form-label text-white-50 small">Username</label>
                    <input type="text" class="form-control auth-input" id="reg-username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-white-50 small">Email address</label>
                    <input type="email" class="form-control auth-input" id="reg-email" required>
                </div>
                <div class="mb-3 position-relative">
                    <label class="form-label text-white-50 small">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control auth-input border-end-0" id="reg-password" required minlength="8">
                        <button class="btn btn-outline-secondary auth-input border-start-0 toggle-password" type="button"><i class="bi bi-eye"></i></button>
                    </div>
                </div>
                <div class="mb-4 position-relative">
                    <label class="form-label text-white-50 small">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control auth-input border-end-0" id="reg-password-confirm" required minlength="8">
                        <button class="btn btn-outline-secondary auth-input border-start-0 toggle-password" type="button"><i class="bi bi-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="reg-submit-btn">Register</button>
            </form>
            <div class="text-center mt-4">
                <span class="text-white-50">Already have an account?</span>
                <button class="btn btn-link text-info text-decoration-none p-0 ms-1 fw-bold" id="show-login">Login</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
